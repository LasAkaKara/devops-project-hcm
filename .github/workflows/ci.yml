name: CI

#Operates when a pull request is opened, synchronized, or reopened against the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  #Step C: build and test job that builds both frontend and backend, run the backend tests, and pushes the images to Docker Hub.
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tododb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tododb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    #checkout using actions template.
      - name: Checkout
        uses: actions/checkout@v4

    #set up node 
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

    #install dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Initialize Test Database
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -p 5432 -U postgres -d tododb -f ./database/database.sql

    #run test on backend
      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tododb
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: npm test

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build backend image
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/devops-group1-backend:latest ./backend

      - name: Build frontend image
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/devops-group1-frontend:latest ./frontend

      - name: Push backend image
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/devops-group1-backend:latest

      - name: Push frontend image
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/devops-group1-frontend:latest

  deploy:
    needs: build-and-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/group-mbb/devops-project-hcm
            git pull origin main
            docker-compose pull
            docker-compose up -d
